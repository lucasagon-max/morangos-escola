<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morangos Tatuí - Pedido Escolar</title>
    <!-- Importando Tailwind para o visual de App e Supabase -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Cor principal da marca Morangos Tatuí */
        .bg-morango { background-color: #E3244B; }
        .text-morango { color: #E3244B; }
        .border-morango { border-color: #E3244B; }
        .bg-morango-light { background-color: #fde8ec; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 pb-24 font-sans">

    <!-- Cabeçalho -->
    <header class="bg-white shadow-sm pt-8 pb-4 px-4 text-center">
        <!-- Substitua o link abaixo pela sua imagem Morangos-Tatui-logotipo.jpg -->
        <img src="https://via.placeholder.com/150x50?text=Morangos+Tatui" alt="Logotipo Morangos Tatuí" class="mx-auto h-12 mb-2 object-contain rounded">
        <h1 class="text-xl font-bold text-gray-800">Dia do Morango na Escola 🍓</h1>
        <p class="text-sm text-gray-500 mt-1">Garanta a bandeja fresca do seu filho!</p>
    </header>

    <main class="max-w-md mx-auto mt-6 px-4">
        
        <!-- Card do Produto -->
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center mb-6">
            <div class="flex-1">
                <h2 class="font-bold text-lg">Bandeja de Morangos</h2>
                <p class="text-xs text-gray-500 mt-1">Morangos selecionados e fresquinhos, entregues direto na escola.</p>
                <p class="text-morango font-bold mt-2">R$ 15,00</p>
            </div>
            <!-- Substitua o link abaixo pela sua imagem Morangos-Tatuí.png -->
            <img src="https://via.placeholder.com/80?text=Bandeja" alt="Bandeja de Morango" class="w-20 h-20 object-cover rounded-lg ml-3">
        </div>

        <form id="pedidoForm" class="space-y-4">
            
            <!-- Dados do Aluno -->
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <h3 class="font-bold mb-3 text-sm text-gray-700">🧑‍🎓 Dados do Aluno</h3>
                <div class="space-y-3">
                    <div>
                        <input type="text" id="nomeAluno" required placeholder="Nome completo do Aluno" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-morango">
                    </div>
                    <div>
                        <input type="text" id="turma" required placeholder="Série / Turma (Ex: 2º Ano A)" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-morango">
                    </div>
                </div>
            </div>

            <!-- Dados do Responsável -->
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <h3 class="font-bold mb-3 text-sm text-gray-700">📱 Dados do Responsável</h3>
                <div class="space-y-3">
                    <div>
                        <input type="text" id="nomeResponsavel" required placeholder="Seu Nome" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-morango">
                    </div>
                    <div>
                        <input type="tel" id="telefone" required placeholder="(15) 99999-9999" maxlength="15" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-morango">
                    </div>
                </div>
            </div>

            <!-- Controle de Quantidade -->
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                <span class="font-bold text-gray-700">Quantidade:</span>
                <div class="flex items-center space-x-4 bg-gray-50 rounded-lg p-1 border border-gray-200">
                    <button type="button" id="btnMenos" class="w-8 h-8 flex items-center justify-center rounded bg-white text-morango font-bold shadow-sm hover:bg-gray-100">-</button>
                    <span id="displayQuantidade" class="font-bold w-4 text-center">1</span>
                    <button type="button" id="btnMais" class="w-8 h-8 flex items-center justify-center rounded bg-morango-light text-morango font-bold shadow-sm hover:bg-red-100">+</button>
                </div>
            </div>

        </form>
    </main>

    <!-- Barra Inferior Fixa -->
    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 p-4 pb-6 shadow-lg">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div>
                <p class="text-xs text-gray-500">Total a pagar</p>
                <p class="font-bold text-xl text-gray-800">R$ <span id="valorTotal">15,00</span></p>
            </div>
            <button type="submit" form="pedidoForm" id="btnPagar" class="bg-morango text-white font-bold py-3 px-8 rounded-full shadow-md hover:bg-red-700 transition w-48 text-center">
                Pagar Agora
            </button>
        </div>
    </div>

<script>
    // 1. CONFIGURAÇÕES
    const PRECO_BANDEJA = 15.00;
    const SUPABASE_URL = 'https://fepvxdmssoqfktqmbyzn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZlcHZ4ZG1zc29xZmt0cW1ieXpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDg4NjUsImV4cCI6MjA4OTkyNDg2NX0.Duy840JZEMWxXzguf1JV71xhjdaLmpZiileBdGAJf0I';
    
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 2. CONTROLE DA TELA (Quantidade, Preço e Máscara)
    let quantidade = 1;
    const btnMenos = document.getElementById('btnMenos');
    const btnMais = document.getElementById('btnMais');
    const displayQuantidade = document.getElementById('displayQuantidade');
    const spanValorTotal = document.getElementById('valorTotal');
    const inputTelefone = document.getElementById('telefone');

    function atualizarTela() {
        displayQuantidade.innerText = quantidade;
        spanValorTotal.innerText = (quantidade * PRECO_BANDEJA).toFixed(2).replace('.', ',');
    }

    btnMenos.addEventListener('click', () => {
        if (quantidade > 1) { quantidade--; atualizarTela(); }
    });

    btnMais.addEventListener('click', () => {
        quantidade++; atualizarTela();
    });

    // Máscara de Telefone (15) 99999-9999
    inputTelefone.addEventListener('input', function (e) {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
    });

    // 3. ENVIAR PEDIDO E ABRIR MERCADO PAGO
    document.getElementById('pedidoForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('btnPagar');
        btn.innerText = "Gerando Pix/Cartão...";
        btn.disabled = true;
        btn.classList.add('opacity-70');

        const nomeAluno = document.getElementById('nomeAluno').value;
        const turma = document.getElementById('turma').value;
        const nomeResponsavel = document.getElementById('nomeResponsavel').value;
        const telefone = document.getElementById('telefone').value;
        const total = quantidade * PRECO_BANDEJA;

        try {
            // A. Salva no banco e pede o ID de volta (.select())
            const { data: pedidoSalvo, error: erroBanco } = await supabase
                .from('pedidos_escola')
                .insert([{ 
                    nome_aluno: nomeAluno, 
                    turma: turma, 
                    nome_responsavel: nomeResponsavel,
                    telefone_responsavel: telefone,
                    quantidade: quantidade, 
                    valor_total: total, 
                    status_pagamento: 'pendente' 
                }])
                .select();

            if (erroBanco) throw erroBanco;

            const pedidoId = pedidoSalvo[0].id;

            // B. Chama a Edge Function que você acabou de criar no prompt de comando!
            const { data: pagamentoData, error: erroPagamento } = await supabase.functions.invoke('gerar-pagamento', {
                body: { pedido_id: pedidoId, quantidade: quantidade }
            });

            if (erroPagamento) throw erroPagamento;

            // C. Redireciona o cliente para a tela oficial do Mercado Pago
            window.location.href = pagamentoData.url;

        } catch (error) {
            alert("Ocorreu um erro ao gerar o pagamento. Tente novamente.");
            console.error(error);
            btn.innerText = "Pagar Agora";
            btn.disabled = false;
            btn.classList.remove('opacity-70');
        }
    });
</script>
</body>
</html>
